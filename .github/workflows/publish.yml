# Runs on push to main (after merge). CI is PR-only; this job re-runs checks then publishes.
name: Publish to npm

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "22"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          registry-url: "https://registry.npmjs.org/"

      - name: Check version not already released
        env:
          GITHUB_ACTIONS: "true"
        run: node scripts/check-version-not-released.mjs

      - name: Install
        run: npm ci

      - name: CI
        run: npm run ci

      - name: Security Audit (prod deps)
        run: npm run audit:prod

      - name: Build
        run: npm run build

      - name: Verify npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "ERROR: secrets.NPM_TOKEN is not set."
            exit 1
          fi
          npm whoami --registry https://registry.npmjs.org/

      - name: Publish
        run: npm publish --access public --registry https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Read package version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          release_name: next-spinners v${{ steps.pkg.outputs.version }}
          draft: false
          prerelease: false
