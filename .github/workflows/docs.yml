# Nextra (Next.js + MDX) → GitHub Pages. Runs when `main` updates (e.g. after PR merge).
# This repo’s CI is PR-only, so we do not use workflow_run on "CI" (it would not
# run on push to main). One-time: Settings → Pages → Source = "GitHub Actions".
# Pattern adapted from https://github.com/cap-jmk-real/shiphook (.github/workflows/docs.yml).
name: Docs (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json

      - name: Install root dependencies (for docs typecheck of ../src imports)
        run: npm ci

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        env:
          DOCS_BASE: /${{ github.event.repository.name }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
