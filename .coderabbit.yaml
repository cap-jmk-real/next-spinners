reviews:
  auto_title_placeholder: "@coderabbitai title"
  auto_title_instructions: >
    Write concise PR titles in this format: "<type>: <summary>".
    Use one type from: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert.
    Keep title under 80 characters.
  tools:
    opengrep:
      enabled: true
